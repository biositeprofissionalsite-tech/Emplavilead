<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quadra 500 Sudoeste - Lançamento Exclusivo</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#000;color:#fff}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
background:linear-gradient(#000000aa,#000),url('https://customer-assets.emergentagent.com/job_lead-capture-56/artifacts/9hj0ylhb_IMG_7489.jpeg') center/cover;
}

.hero h1{font-size:40px}

.btn{
background:#d97706;
padding:15px 30px;
border:none;
border-radius:50px;
color:#fff;
cursor:pointer;
margin-top:20px;
}

.form-section{padding:40px}

.form-container{
max-width:500px;
margin:auto;
background:#111;
padding:30px;
border-radius:15px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
background:#222;
border:none;
color:#fff;
border-radius:8px;
}

.whatsapp-float{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
text-decoration:none;
color:#fff;
}

.section{
padding:60px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#111;
padding:20px;
border-radius:12px;
}

.rubi-images{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:30px;
}

.rubi-images img{
width:100%;
border-radius:10px;
}

footer{
padding:30px;
text-align:center;
color:#888;
}
</style>
</head>

<body>

<a href="https://wa.me/5561985309658" class="whatsapp-float">💬</a>

<!-- HERO -->
<section class="hero">
<div>
<h1>AS NOVAS JOIAS</h1>
<h2>NA QUADRA 500</h2>
<p>Lançamento exclusivo no Sudoeste</p>
<button class="btn" onclick="scrollToForm()">Cadastre-se</button>
</div>
</section>

<!-- FORM -->
<section class="form-section" id="form">
<div class="form-container">
<h2>Cadastre-se</h2>

<form onsubmit="enviar(event)">
<input type="text" placeholder="Nome" required>
<input type="email" placeholder="Email" required>
<input type="tel" id="celular" placeholder="Celular" required>

<select required>
<option value="">Quartos</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button class="btn">Enviar</button>
</form>

</div>
</section>

<!-- AMETISTA -->
<section class="section">
<h2>Residencial Ametista</h2>
<p>Único 2 quartos da quadra 500</p>

<div class="grid">
<div class="card">2 Quartos</div>
<div class="card">Exclusivo</div>
<div class="card">Localização Premium</div>
</div>
</section>

<!-- RUBI -->
<section class="section">
<h2>Residencial Rubi</h2>
<p>4 suítes com vista livre</p>

<div class="rubi-images">
<img src="https://customer-assets.emergentagent.com/job_lead-capture-56/artifacts/zi8b8upq_IMG_7490.jpeg">
<img src="https://customer-assets.emergentagent.com/job_lead-capture-56/artifacts/9hj0ylhb_IMG_7489.jpeg">
<img src="https://customer-assets.emergentagent.com/job_lead-capture-56/artifacts/9w024jfm_IMG_7491.jpeg">
</div>

<div class="grid">
<div class="card">4 Suítes</div>
<div class="card">Vista Livre</div>
<div class="card">Até 505m²</div>
<div class="card">Alto Padrão</div>
</div>

<button class="btn" onclick="scrollToForm()">Quero conhecer o Rubi</button>
</section>

<!-- FOOTER -->
<footer>
<p>© 2026 Quadra 500 Sudoeste</p>
</footer>

<!-- SCRIPT -->
<script>
function scrollToForm(){
document.getElementById("form").scrollIntoView({behavior:"smooth"})
}

function enviar(e){
e.preventDefault()
alert("Lead enviado com sucesso!")
}

// máscara celular
document.getElementById('celular').addEventListener('input', function (e) {
let v = e.target.value.replace(/\D/g, '')

if (v.length > 11) v = v.slice(0, 11)

if (v.length > 6) {
v = v.replace(/(\d{2})(\d{5})(\d{0,4})/, '($1) $2-$3')
} else if (v.length > 2) {
v = v.replace(/(\d{2})(\d{0,5})/, '($1) $2')
}

e.target.value = v
})
</script>

</body>
  </html>
